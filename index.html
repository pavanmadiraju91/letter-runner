<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="dark light">
  <title>Letter Runner</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a0f; min-width: 800px; min-height: 400px; }
    @media (prefers-color-scheme: light) {
      html, body { background: #f4f4fa; }
    }
    canvas {
      display: block;
      image-rendering: pixelated;
      image-rendering: -moz-crisp-edges;
      -webkit-image-rendering: crisp-edges;
    }
  </style>
</head>
<body>
  <canvas id="game"></canvas>
  <a id="github-link" href="https://github.com/pavanmadiraju91/letter-runner" target="_blank"
     style="position:fixed; bottom:20px; left:50%; transform:translateX(-50%);
     color:#667788; font-family:'Courier New',monospace; font-size:11px; text-decoration:none; z-index:10;
     transition: color 0.2s;">
     github.com/pavanmadiraju91/letter-runner
  </a>
  <style>
    #github-link:hover { color: #00ffcc; }
  </style>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
