<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="color-scheme" content="dark">
  <title>Letter Runner</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a0f; }
    canvas {
      display: block;
      image-rendering: pixelated;
      image-rendering: -moz-crisp-edges;
      -webkit-image-rendering: crisp-edges;
    }
    #github-link {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      color: #667788; font-family: 'Courier New', monospace; font-size: 11px;
      text-decoration: none; z-index: 10; transition: color 0.2s, opacity 0.3s;
    }
    #github-link:hover { color: #00ffcc; }
    #github-link.hidden { opacity: 0; pointer-events: none; }
    #mobile-input {
      position: fixed; top: -100px; left: 0; width: 1px; height: 1px; opacity: 0;
      z-index: -1; font-size: 16px;
    }
  </style>
</head>
<body>
  <canvas id="game"></canvas>
  <input id="mobile-input" type="text" autocomplete="off" autocapitalize="off" autocorrect="off" inputmode="text">
  <a id="github-link" href="https://github.com/pavanmadiraju91/letter-runner" target="_blank">
    github.com/pavanmadiraju91/letter-runner
  </a>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
