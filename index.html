<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="color-scheme" content="dark">
  <title>Letter Runner</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a0f; }
    canvas {
      display: block;
      image-rendering: pixelated;
      image-rendering: -moz-crisp-edges;
      -webkit-image-rendering: crisp-edges;
    }
    #github-link {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      color: #667788; font-family: 'Courier New', monospace; font-size: 11px;
      text-decoration: none; z-index: 10; transition: color 0.2s, opacity 0.3s;
    }
    #github-link:hover { color: #00ffcc; }
    #github-link.hidden { opacity: 0; pointer-events: none; }
    #mobile-input {
      position: fixed; bottom: 0; left: 0; width: 100%; height: 50px;
      font-size: 16px; text-align: center;
      background: rgba(0, 0, 0, 0.8); color: #00ffcc;
      border: none; border-top: 1px solid #00ffcc33;
      outline: none; caret-color: #00ffcc;
      z-index: 100;
      display: none;
    }
    #mobile-input::placeholder { color: #33665580; }
    body.mobile-active #mobile-input { display: block; }
  </style>
</head>
<body>
  <canvas id="game"></canvas>
  <input id="mobile-input" type="text" autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false" inputmode="text" enterkeyhint="go" placeholder="Tap here to type">
  <a id="github-link" href="https://github.com/pavanmadiraju91/letter-runner" target="_blank">
    github.com/pavanmadiraju91/letter-runner
  </a>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
